services:
  app:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-*}
      - DATA_DIR=/app/data
      - DATABASE_URL=sqlite+aiosqlite:////app/data/scraper.db
    restart: unless-stopped
